name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Release version, for example 0.1.0 or v0.1.0"
        required: true
        type: string

permissions:
  contents: write

jobs:
  dmg:
    name: Build DMG
    runs-on: macos-26
    environment: release

    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Resolve release version
        env:
          RAW_VERSION: ${{ inputs.version }}
        run: |
          raw_version="$RAW_VERSION"
          version="${raw_version#v}"

          if [[ ! "$version" =~ ^[0-9]+[.][0-9]+[.][0-9]+([.-][0-9A-Za-z.-]+)?$ ]]; then
            echo "Invalid version: $raw_version"
            echo "Use a semantic version like 0.1.0 or v0.1.0."
            exit 1
          fi

          release_tag="v$version"
          echo "RELEASE_TAG=$release_tag" >> "$GITHUB_ENV"
          echo "DOMA_VERSION=$version" >> "$GITHUB_ENV"
          echo "DMG_PATH=dist/Doma-$version.dmg" >> "$GITHUB_ENV"
          echo "APPCAST_PATH=dist/appcast.xml" >> "$GITHUB_ENV"

      - name: Show toolchain
        run: |
          swift --version
          xcodebuild -version

      - name: Download Sparkle signing tools
        run: |
          archive="$RUNNER_TEMP/Sparkle-2.9.4.tar.xz"
          destination="$RUNNER_TEMP/sparkle"

          curl --fail --location --silent --show-error \
            https://github.com/sparkle-project/Sparkle/releases/download/2.9.4/Sparkle-2.9.4.tar.xz \
            --output "$archive"
          echo "ce89daf967db1e1893ed3ebd67575ed82d3902563e3191ca92aaec9164fbdef9  $archive" \
            | shasum --algorithm 256 --check
          mkdir -p "$destination"
          tar -xJf "$archive" -C "$destination"
          echo "SPARKLE_BIN=$destination/bin" >> "$GITHUB_ENV"

      - name: Build DMG
        run: ./scripts/build-dmg.sh "$DOMA_VERSION"

      - name: Generate signed update feed
        env:
          SPARKLE_PRIVATE_KEY: ${{ secrets.SPARKLE_ED25519_PRIVATE_KEY }}
        run: |
          if [ -z "$SPARKLE_PRIVATE_KEY" ]; then
            echo "SPARKLE_ED25519_PRIVATE_KEY is not configured."
            exit 1
          fi

          printf '%s' "$SPARKLE_PRIVATE_KEY" \
            | "$SPARKLE_BIN/generate_appcast" \
                --ed-key-file - \
                --download-url-prefix "https://github.com/MrFlashAccount/Doma/releases/download/$RELEASE_TAG/" \
                --link "https://github.com/MrFlashAccount/Doma" \
                --maximum-versions 1 \
                "$PWD/dist"

          xmllint --noout "$APPCAST_PATH"
          grep -q 'sparkle:edSignature=' "$APPCAST_PATH"
          grep -q 'sparkle-signatures:' "$APPCAST_PATH"
          printf '%s' "$SPARKLE_PRIVATE_KEY" \
            | "$SPARKLE_BIN/sign_update" \
                --ed-key-file - \
                --verify \
                "$APPCAST_PATH"

      - name: Verify app signature and image
        run: |
          codesign --verify --deep --strict --verbose=2 .build/release/Doma.app
          hdiutil verify "$DMG_PATH"

          if spctl --assess --type execute .build/release/Doma.app; then
            echo "Gatekeeper accepted the ad-hoc signed app."
          else
            echo "Doma is ad-hoc signed and not notarized; a first-launch warning is expected."
          fi

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v7
        with:
          name: Doma-${{ env.DOMA_VERSION }}
          path: |
            ${{ env.DMG_PATH }}
            ${{ env.APPCAST_PATH }}
          if-no-files-found: error

      - name: Create release tag
        run: |
          if git ls-remote --exit-code --tags origin "refs/tags/$RELEASE_TAG" >/dev/null 2>&1; then
            git fetch origin "refs/tags/$RELEASE_TAG:refs/tags/$RELEASE_TAG"
            tag_commit="$(git rev-list -n 1 "$RELEASE_TAG")"

            if [ "$tag_commit" != "$GITHUB_SHA" ]; then
              echo "Tag $RELEASE_TAG already exists on $tag_commit, not $GITHUB_SHA."
              exit 1
            fi

            echo "Tag $RELEASE_TAG already exists on this commit."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag -a "$RELEASE_TAG" -m "Doma $RELEASE_TAG" "$GITHUB_SHA"
          git push origin "refs/tags/$RELEASE_TAG"

      - name: Publish GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          notes="Doma $RELEASE_TAG. The app is ad-hoc signed and not notarized, so macOS may show a warning on first launch."

          if gh release view "$RELEASE_TAG" >/dev/null 2>&1; then
            gh release upload "$RELEASE_TAG" "$DMG_PATH" "$APPCAST_PATH" --clobber
            gh release edit "$RELEASE_TAG" --latest
          else
            gh release create "$RELEASE_TAG" "$DMG_PATH" "$APPCAST_PATH" \
              --title "Doma $RELEASE_TAG" \
              --notes "$notes" \
              --latest
          fi
